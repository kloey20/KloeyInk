<!--
  daily_verses settings form.

  IMPORTANT: this is a FRAGMENT, not a full web page. InkyPi injects it into
  its own settings screen, so there is intentionally no <html>, <head>, or
  <body> here. The class names below (form-group) are placeholders - for a
  perfect visual match, copy the classes an existing plugin (e.g. Weather)
  uses in its own settings.html.
-->

<!-- Setting 1: maximum font size.
     name="font_cap" -> becomes the key settings["font_cap"] in Python.
     value="90" is the default shown before the user changes anything. -->
<div class="form-group">
  <label for="font_cap">Maximum font size</label>
  <input type="number" id="font_cap" name="font_cap" min="24" max="120" value="90">
</div>

<!-- Setting 2: verse mode.
     BOTH radios share name="verse_mode" - that shared name is what groups
     them and makes them mutually exclusive. Each has a different value, and
     the selected radio's value is what reaches Python. checked = default. -->
<div class="form-group">
  <label>Verse mode</label>

  <label>
    <input type="radio" name="verse_mode" value="daily" checked>
    Daily
  </label>

  <label>
    <input type="radio" name="verse_mode" value="random">
    Random
  </label>
</div>

<!--
  EDIT MODE (the bit most custom plugins forget).
  When this plugin instance is opened from a playlist to be edited, InkyPi
  sets loadPluginSettings = true and exposes the saved values on the
  pluginSettings object. Without this block, editing an existing instance
  would show blank defaults and silently overwrite the user's saved choices.
-->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof loadPluginSettings !== 'undefined' && loadPluginSettings) {
      // Refill the number input with the saved value (fall back to 90)
      document.getElementById('font_cap').value = pluginSettings.font_cap || 90;

      // Re-check whichever radio matches the saved verse_mode (fall back to daily)
      const savedMode = pluginSettings.verse_mode || 'daily';
      document.querySelector(
        `input[name="verse_mode"][value="${savedMode}"]`
      ).checked = true;
    }
  });
</script>
